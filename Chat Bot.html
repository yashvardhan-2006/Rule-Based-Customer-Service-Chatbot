<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aria — Customer Service Chatbot</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f1efe8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .chat-wrap {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 480px;
      height: 620px;
      background: #ffffff;
      border: 0.5px solid #d3d1c7;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
    }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 0.5px solid #d3d1c7;
      background: #f1efe8;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #e6f1fb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 500;
      color: #185fa5;
      flex-shrink: 0;
    }

    .header-info { flex: 1; }
    .header-name { font-size: 14px; font-weight: 500; color: #1a1a1a; }
    .header-status { font-size: 12px; color: #888780; display: flex; align-items: center; gap: 5px; margin-top: 1px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #fafaf8;
    }

    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #d3d1c7; border-radius: 4px; }

    .msg { display: flex; gap: 8px; align-items: flex-end; }
    .msg.user { flex-direction: row-reverse; }

    .bubble {
      max-width: 78%;
      padding: 10px 13px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.55;
      color: #1a1a1a;
    }

    .msg.bot .bubble {
      background: #ffffff;
      border: 0.5px solid #d3d1c7;
      border-bottom-left-radius: 4px;
    }

    .msg.user .bubble {
      background: #378add;
      color: #ffffff;
      border-bottom-right-radius: 4px;
    }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #e6f1fb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 500;
      color: #185fa5;
      flex-shrink: 0;
    }

    .typing { display: flex; align-items: center; gap: 4px; padding: 10px 13px; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%;
      background: #888780;
      animation: blink 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px 14px 6px;
      background: #fafaf8;
      border-top: 0.5px solid #ebe9e0;
    }

    .chip {
      font-size: 12px;
      padding: 5px 11px;
      border-radius: 20px;
      border: 0.5px solid #b5d4f4;
      background: #e6f1fb;
      color: #185fa5;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .chip:hover { background: #378add; color: #ffffff; border-color: #378add; }

    .chat-input-row {
      display: flex;
      gap: 8px;
      padding: 12px 14px;
      border-top: 0.5px solid #d3d1c7;
      background: #f1efe8;
      align-items: center;
    }

    .chat-input-row input {
      flex: 1;
      border: 0.5px solid #d3d1c7;
      border-radius: 20px;
      padding: 9px 14px;
      font-size: 14px;
      background: #ffffff;
      color: #1a1a1a;
      outline: none;
      font-family: inherit;
    }
    .chat-input-row input::placeholder { color: #b4b2a9; }
    .chat-input-row input:focus { border-color: #378add; box-shadow: 0 0 0 2px #e6f1fb; }

    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #378add;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      flex-shrink: 0;
      font-size: 16px;
      transition: opacity 0.15s;
    }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:active { transform: scale(0.95); }
  </style>
</head>
<body>

<div class="chat-wrap">
  <div class="chat-header">
    <div class="avatar">A</div>
    <div class="header-info">
      <div class="header-name">Aria</div>
      <div class="header-status"><span class="status-dot"></span> Customer support &middot; Online</div>
    </div>
    <i class="ti ti-dots" style="font-size:18px; color:#888780; cursor:pointer;" aria-hidden="true"></i>
  </div>

  <div class="chat-messages" id="messages"></div>

  <div class="chips" id="chips">
    <span class="chip" onclick="sendChip('Where is my order?')">Track order</span>
    <span class="chip" onclick="sendChip('I want a refund')">Refund</span>
    <span class="chip" onclick="sendChip('Payment issue')">Payment</span>
    <span class="chip" onclick="sendChip('Do you have any discounts?')">Discounts</span>
    <span class="chip" onclick="sendChip('help')">Help menu</span>
  </div>

  <div class="chat-input-row">
    <input type="text" id="msgInput" placeholder="Type your message…" onkeydown="if(event.key==='Enter') sendMsg()" />
    <button class="send-btn" onclick="sendMsg()" aria-label="Send message">
      <i class="ti ti-send" aria-hidden="true"></i>
    </button>
  </div>
</div>

<script>
  const RESPONSES = {
    greet: {
      patterns: ["hello","hi","hey","good morning","good evening","howdy","sup","what's up"],
      response: "Hey there! 👋 I'm Aria, your customer support assistant. How can I help you today?"
    },
    order_status: {
      patterns: ["order","where is my order","track","tracking","shipment","delivery","shipped","package"],
      response: "📦 To track your order, visit our Order Tracking page and enter your order ID. You can find your order ID in the confirmation email we sent you. Need anything else?"
    },
    refund: {
      patterns: ["refund","money back","return","cancel order","get my money","reimbursement"],
      response: "💳 Refunds are processed within 5–7 business days back to your original payment method. Go to My Orders → Select Order → Request Refund. Need help with anything else?"
    },
    payment: {
      patterns: ["payment","pay","invoice","billing","charge","credit card","debit","upi","transaction"],
      response: "💰 We accept Credit/Debit cards, UPI, Net Banking, and PayTM. If your payment failed, please wait 10 minutes — if charged, it'll auto-refund in 3–5 days. Anything else?"
    },
    account: {
      patterns: ["account","login","password","sign in","sign up","register","profile","forgot password"],
      response: "🔐 Click Forgot Password on the login page to reset via email. If you're locked out, email support@example.com and our team will verify your identity. Anything else?"
    },
    hours: {
      patterns: ["hours","open","timing","when","available","working hours","support hours"],
      response: "🕐 Our support team is available Monday to Saturday, 9 AM – 6 PM IST. For urgent issues outside hours, email support@example.com — we'll respond within 24 hours!"
    },
    contact: {
      patterns: ["contact","phone","email","call","speak","human","agent","representative","talk to someone"],
      response: "📞 You can reach us at:\n• Email: support@example.com\n• Phone: 1800-XXX-XXXX (toll free)\n• Live Chat: available on our website 9 AM–6 PM IST\n\nWant me to help with something else?"
    },
    complaint: {
      patterns: ["complaint","issue","problem","not working","broken","damaged","wrong item","bad","terrible","worst"],
      response: "😔 I'm really sorry to hear that! Please email your complaint with photos to support@example.com and we'll prioritize your case. You'll hear back within 24 hours."
    },
    thanks: {
      patterns: ["thank","thanks","thank you","great","awesome","helpful","perfect","good","nice"],
      response: "😊 Happy to help! Is there anything else I can assist you with today?"
    },
    bye: {
      patterns: ["bye","goodbye","see you","take care","exit","quit","done","that's all"],
      response: "👋 Thanks for reaching out! Have a great day. Feel free to come back anytime. Goodbye!"
    },
    discount: {
      patterns: ["discount","coupon","promo","offer","deal","sale","code","voucher"],
      response: "🎉 Check our Offers page for current deals! Subscribe to our newsletter for exclusive promo codes. First-time users get 10% off with code WELCOME10!"
    },
  };

  const FALLBACK = "🤔 I'm not sure I understood that. Could you rephrase? You can ask me about orders, refunds, payments, or account issues. Type help to see all topics!";

  const HELP_MSG = "Here's what I can help you with:\n📦 Order tracking — where is my order?\n💳 Refunds and returns — how to get a refund?\n💰 Payments and billing — payment issues\n🔐 Account and login — password reset\n🕐 Support hours — when are you open?\n📞 Contact us — speak to a human\n😔 Complaints — report an issue\n🎉 Discounts — promo codes and offers";

  function getResponse(input) {
    const text = input.toLowerCase().trim();
    if (["help", "menu", "options", "what can you do"].includes(text)) return HELP_MSG;
    for (const intent in RESPONSES) {
      const d = RESPONSES[intent];
      for (const p of d.patterns) {
        const escaped = p.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        if (text.includes(p) || new RegExp('\\b' + escaped + '\\b').test(text)) {
          return d.response;
        }
      }
    }
    return FALLBACK;
  }

  function appendMsg(text, role) {
    const msgs = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + role;
    if (role === 'bot') {
      const av = document.createElement('div');
      av.className = 'msg-avatar';
      av.textContent = 'A';
      wrap.appendChild(av);
    }
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = text.replace(/\n/g, '<br>');
    wrap.appendChild(bubble);
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showTyping() {
    const msgs = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = 'msg bot';
    wrap.id = 'typing-indicator';
    const av = document.createElement('div');
    av.className = 'msg-avatar';
    av.textContent = 'A';
    wrap.appendChild(av);
    const bubble = document.createElement('div');
    bubble.className = 'bubble typing';
    bubble.innerHTML = '<span></span><span></span><span></span>';
    wrap.appendChild(bubble);
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function sendMsg() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    document.getElementById('chips').style.display = 'none';
    appendMsg(text, 'user');
    showTyping();
    setTimeout(() => {
      removeTyping();
      appendMsg(getResponse(text), 'bot');
    }, 500);
  }

  function sendChip(text) {
    document.getElementById('msgInput').value = text;
    sendMsg();
  }

  appendMsg("Hey! 👋 I'm Aria, your support assistant. How can I help you today? Tap a suggestion or type your question below.", 'bot');
</script>

</body>
</html>
